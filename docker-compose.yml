services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag_engine
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag"]
      interval: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports: ["5672:5672", "15672:15672"]

  api:
    build: ../rag_engine
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    ports: ["8000:8000"]
    volumes: [".:/code"]
    depends_on:
      db: { condition: service_healthy }
      rabbitmq: { condition: service_started }

  worker:
    build: ../rag_engine
    command: celery -A app.celery.celery_app celery --loglevel=info
    env_file: .env
    volumes: [".:/code"]
    depends_on:
      db: { condition: service_healthy }
      rabbitmq: { condition: service_started }

volumes:
  pgdata:
